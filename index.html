<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium League</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
input, select, button { margin: 5px; padding: 5px; }
table { border-collapse: collapse; margin-top: 20px; width: 100%; }
table, th, td { border: 1px solid black; }
th, td { padding: 8px; text-align: center; }
</style>
</head>
<body>

<h1>Premium League</h1>

<h2>Register Player</h2>
<form id="registerForm">
  <input type="text" id="name" placeholder="Player Name" required>
  <input type="text" id="team" placeholder="Team Name">
  <button type="submit">Register</button>
</form>

<h2>Add Match Result</h2>
<form id="matchForm">
  <select id="player1" required></select>
  <input type="number" id="score1" placeholder="Score" required>
  vs
  <select id="player2" required></select>
  <input type="number" id="score2" placeholder="Score" required>
  <button type="submit">Add Match</button>
</form>

<h2>League Table</h2>
<table>
<thead>
<tr>
  <th>Player</th>
  <th>Played</th>
  <th>Wins</th>
  <th>Draws</th>
  <th>Losses</th>
  <th>GF</th>
  <th>GA</th>
  <th>GD</th>
  <th>Points</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h2>Compare Players</h2>
<select id="compare1"></select>
<select id="compare2"></select>
<button onclick="comparePlayers()">Compare</button>
<div id="compareResult"></div>

<script>
// Utility Functions
function savePlayers(players) { localStorage.setItem('players', JSON.stringify(players)); }
function loadPlayers() { return JSON.parse(localStorage.getItem('players') || '[]'); }
function updateSelects() {
  const players = loadPlayers();
  const sel1 = document.getElementById('player1');
  const sel2 = document.getElementById('player2');
  const c1 = document.getElementById('compare1');
  const c2 = document.getElementById('compare2');
  [sel1, sel2, c1, c2].forEach(s => { s.innerHTML = ''; players.forEach(p => {
    const opt = document.createElement('option'); opt.value = p.name; opt.text = p.name; s.add(opt);
  })});
}
function updateTable() {
  const tbody = document.getElementById('tableBody');
  const players = loadPlayers().sort((a,b)=>b.points-b.points || (b.goals_for-b.goals_against)-(a.goals_for-a.goals_against));
  tbody.innerHTML = '';
  players.forEach(p=>{
    tbody.innerHTML += `<tr>
      <td>${p.name}</td><td>${p.played}</td><td>${p.wins}</td><td>${p.draws}</td>
      <td>${p.losses}</td><td>${p.goals_for}</td><td>${p.goals_against}</td>
      <td>${p.goals_for - p.goals_against}</td><td>${p.points}</td>
    </tr>`;
  });
}

// Register Player
document.getElementById('registerForm').addEventListener('submit', e=>{
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const team = document.getElementById('team').value.trim();
  if(!name) return alert('Enter name!');
  let players = loadPlayers();
  if(players.some(p=>p.name===name)) return alert('Player already exists!');
  players.push({name, team, played:0, wins:0, draws:0, losses:0, goals_for:0, goals_against:0, points:0});
  savePlayers(players);
  updateSelects(); updateTable();
  e.target.reset();
});

// Add Match
document.getElementById('matchForm').addEventListener('submit', e=>{
  e.preventDefault();
  const p1Name = document.getElementById('player1').value;
  const p2Name = document.getElementById('player2').value;
  const s1 = parseInt(document.getElementById('score1').value);
  const s2 = parseInt(document.getElementById('score2').value);
  if(p1Name===p2Name) return alert('Select different players!');
  let players = loadPlayers();
  const p1 = players.find(p=>p.name===p1Name);
  const p2 = players.find(p=>p.name===p2Name);
  [p1,p2].forEach(p=>p.played++);
  p1.goals_for += s1; p1.goals_against += s2;
  p2.goals_for += s2; p2.goals_against += s1;
  if(s1>s2){ p1.wins++; p2.losses++; p1.points+=3; }
  else if(s1<s2){ p2.wins++; p1.losses++; p2.points+=3; }
  else { p1.draws++; p2.draws++; p1.points++; p2.points++; }
  savePlayers(players); updateTable(); e.target.reset();
});

// Compare Players
function comparePlayers() {
  const name1 = document.getElementById('compare1').value;
  const name2 = document.getElementById('compare2').value;
  if(name1===name2) return alert('Select different players!');
  const players = loadPlayers();
  const p1 = players.find(p=>p.name===name1);
  const p2 = players.find(p=>p.name===name2);
  document.getElementById('compareResult').innerHTML = `
    <h3>${p1.name} vs ${p2.name}</h3>
    <p>${p1.name}: ${p1.points} pts, GD: ${p1.goals_for-p1.goals_against}, Wins: ${p1.wins}</p>
    <p>${p2.name}: ${p2.points} pts, GD: ${p2.goals_for-p2.goals_against}, Wins: ${p2.wins}</p>
  `;
}

// Initial Load
updateSelects(); updateTable();
</script>

</body>
</html>
